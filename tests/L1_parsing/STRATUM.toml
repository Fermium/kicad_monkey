# L1_parsing Stratum Configuration
# OOP model parsing and round-trip validation
#
# This stratum proves the OOP data models are correct by parsing KiCad files
# and verifying round-trip fidelity (parse -> serialize -> parse = equivalent).

name = "Parsing"
order = 1
description = "OOP model parsing and round-trip validation"
enabled = true
concerns = ["parsing", "parsing.pcb", "parsing.footprint"]

# Stratum-level objectives
objectives = [
    "PCB files parse correctly to OOP model",
    "Footprint files parse correctly to OOP model",
    "Round-trip produces equivalent data structures",
    "All element types handled correctly",
    "OOP model accessors return correct values"
]

# =============================================================================
# Code Under Test
# =============================================================================
# This stratum tests the OOP parsing layer:
#
# Module: kicad_monkey.kicad_pcb - Complete PCB parser
# Module: kicad_monkey.kicad_footprint - Footprint parser
# Module: kicad_monkey.kicad_pad - Pad class (all shapes)
# Module: kicad_monkey.kicad_fp_* - Footprint element classes
# Module: kicad_monkey.kicad_pcb_routing - Segment, Via, Arc
# Module: kicad_monkey.kicad_pcb_graphics - GrText, GrLine, etc.
# Module: kicad_monkey.kicad_pcb_zone - Zone class

# =============================================================================
# Subtest Manifest
# =============================================================================
# Tests will be migrated from:
# - legacy/test_roundtrip.py
# - legacy/test_kicad_footprint_roundtrip.py
# - legacy/test_oop_equivalency.py
# - legacy/test_parser_equivalency.py

[[subtests]]
file = "test_L1_001_pcb_roundtrip.py"
name = "PCB Round-Trip"
description = "Parse -> serialize -> parse PCB files with equivalency check"
test_cases = "${WN_TEST_CORPUS}/kicad/common/board/input"
test_case_type = "reference"

[subtests.code_under_test]
module = "kicad_monkey.kicad_pcb"
classes = ["KiCadPcb"]

[subtests.objectives]
primary = "PCB files survive parse -> serialize -> parse cycle"
secondary = [
    "All routing elements preserved",
    "All graphics elements preserved",
    "Zone data preserved",
    "Layer information preserved",
    "Net assignments preserved"
]

# -----------------------------------------------------------------------------

[[subtests]]
file = "test_L1_002_footprint_roundtrip.py"
name = "Footprint Round-Trip"
description = "Parse -> serialize -> parse footprint files with equivalency check"
test_cases = "${WN_TEST_CORPUS}/kicad/common/footprints/input"
