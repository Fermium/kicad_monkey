name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS CI is deferred for the first public release until hosted-runner
        # font and KiCad-adjacent wheel compatibility is explicitly validated.
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install public font dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig fonts-dejavu-core fonts-liberation
      - name: Prepare public corpus archive
        run: |
          uv run --extra test python scripts/package_kicad_corpus.py --check
          uv run --extra test python -c "import sys; sys.path.insert(0, 'tests'); from _suite_paths import TEST_CORPUS_ROOT; print(TEST_CORPUS_ROOT)"
      - name: Run public test and signoff baseline
        run: |
          uv run --extra test python tests/rack.py run L0_foundation
          uv run --extra test python tests/rack.py run L99_signoff
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed import test
        run: uv run --extra test python tests/support_scripts/install_test.py
