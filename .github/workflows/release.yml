name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: astral-sh/setup-uv@v5
      - name: Install public font dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig fonts-dejavu-core fonts-liberation
      - name: Verify tag matches package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Verify release notes mention package version
        shell: bash
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          RELEASE_DATE="$(uv run python -c 'import tomllib; v=tomllib.load(open("pyproject.toml","rb"))["project"]["version"]; y,m,d,*_=map(int,v.split(".")); print(f"{y:04d}-{m:02d}-{d:02d}")')"
          grep -F "## ${VERSION}" CHANGELOG.md
          test -f "docs/releases/${RELEASE_DATE}.md"
          grep -F "\`${VERSION}\`" "docs/releases/${RELEASE_DATE}.md"
      - name: Prepare public corpus archive
        run: uv run --extra test python scripts/package_kicad_corpus.py --check
      - name: Run public Rack gates
        run: |
          uv run --extra test python tests/rack.py run L0_foundation
          uv run --extra test python tests/rack.py run L99_signoff
      - name: Build package
        run: uv run --extra test python -m build
      - name: Check package
        run: uv run --extra test twine check dist/*
      - name: Run installed import test
        run: uv run --extra test python tests/support_scripts/install_test.py
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
